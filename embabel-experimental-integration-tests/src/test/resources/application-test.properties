# Test configuration to disable interactive shell
shell.interactive=false
spring.shell.interactive.enabled=false

# Configure LLM model for testing - override global test config
embabel.models.default-llm=gpt-4.1-mini
embabel.models.llms.best=gpt-4.1-mini
embabel.models.llms.cheapest=gpt-4.1-mini

# Configure embedding models for testing
embabel.models.default-embedding-model=text-embedding-3-small
embabel.models.embedding-services.best=text-embedding-3-small
embabel.models.embedding-services.cheapest=text-embedding-3-small


